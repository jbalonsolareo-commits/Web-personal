      id: 'story',
      title: 'Zoppa Story',
      body: `
        <p>The idea behind Zoppa didn't start overnight. Since high school, I had this recurring thought: <strong>take a business model that works in developed markets and bring it to Latin America</strong>, where it doesn't exist yet, just like <strong>Mercado Libre did with eBay</strong>.</p>
        <p>Once, my dad was traveling to the US for work, and I wanted to ask him to bring me some clothes. I started searching brand by brand, and it took forever. I just wanted a hoodie. At some point, I typed "hoodies in USA" into Google, and that's when I discovered <strong>ASOS</strong>.</p>
        <p>It felt like a completely different experience. <strong>A multi-brand platform with great curation, strong brands, and powerful filters.</strong> I ended up buying not just the hoodie, but also two t-shirts and a pair of jeans. Everything arrived perfectly.</p>
        <p>That's when it clicked.</p>
        <p>I remember telling my friends about it at a barbecue and saying, <strong>"I want to build this in Argentina."</strong> One of them replied, "That already exists. It's called Dafiti, and it's terrible."</p>
        <p>I looked into it and quickly lost confidence. Dafiti was already big, and I had no experience. It felt impossible to compete. But the idea stayed in the back of my mind.</p>
        <p>Years later, in <strong>October 2023</strong>, something changed. A news article came out saying that <strong>Dafiti was leaving Argentina after never becoming profitable.</strong> That reignited everything.</p>
        <p>In <strong>early 2024</strong>, while working on my thesis, I decided to build it around this idea. We analyzed the market deeply, studied ASOS and Global Fashion Group (Dafiti), and designed a business model inspired by ASOS, adapted to Argentina.</p>
        <p>The feedback was strong. <strong>One of the evaluators even said he would invest</strong>, but that we needed to improve our storytelling.</p>
        <p>At the time, I was studying, working, and playing rugby, with very limited time. But once I finished everything, I made a decision that, looking back, was one of the best I've made: <strong>I fully committed to Zoppa.</strong></p>
        <p>Through the research, I realized something critical.</p>
        <p>ASOS and Dafiti generated billions in revenue, but they also carried massive fixed costs. Warehousing, logistics, inventory, and large teams made their operations extremely expensive. Despite their scale, both companies have consistently lost many millions of dollars year after year.</p>
        <p>So the question became clear:</p>
        <p><strong>How do I build an ASOS without the problems of ASOS?</strong></p>
        <p>For days, I couldn't find the answer.</p>
        <p>Then I reached out to a founder on LinkedIn. He invited me to his house, and I went with someone who would later become my co-founder. He didn't give us a direct answer, but he told us a story that changed everything.</p>
        <p>He explained <strong>how DoorDash started.</strong> In the beginning, they didn't have integrations or infrastructure. They simply uploaded photos of restaurant menus, and when someone ordered, they manually went to the restaurant and fulfilled it.</p>
        <p>That idea unlocked everything.</p>
        <p>We realized we didn't need full integrations or brand agreements to start. <strong>We could scrape existing e-commerce sites and validate demand first.</strong> More importantly, we saw a way to avoid the biggest problem of companies like ASOS and Dafiti: fixed costs.</p>
        <p>Instead of holding inventory or managing logistics, <strong>we could connect directly to brands' e-commerce stores.</strong> This way, products would be listed on our platform, and when a customer made a purchase, <strong>the order would be automatically sent via API to the brand's online store</strong>, where it would be processed as a regular order, requiring no additional effort from the brand.</p>
        <p>In my head, this was the breakthrough.</p>
        <p>I believed we could build an ASOS without ASOS's structural problems. I believed that if we executed well, even a company that once reached a <strong>$13 billion valuation</strong> wouldn't be able to compete with a much more efficient model. It would be extremely difficult for them to reduce their fixed costs to our level, given their large teams, warehouses, and operational structure.</p>
        <p>And I made another key assumption:</p>
        <p><strong>If ASOS was already generating billions in revenue, then demand was already validated.</strong> We wouldn't need to prove that people wanted this.</p>
        <p>Looking back, that assumption would later prove to be incomplete.</p>
        <p>In simple terms, Zoppa was a fashion marketplace built with one idea in mind:</p>
        <p><strong>become ASOS, without the problems that made ASOS struggle.</strong></p>
      `,

    {

        <p><strong>Execution was ultimately not at the level it needed to be, and that became the main reason the company failed.</strong></p>
        <p>As painful as it is to admit, <strong>we did not execute well enough to reach our goal.</strong> We started with WordPress and later moved to a custom built solution. <strong>What should have taken two or three months ended up taking close to ten</strong>, costing us a significant amount of time and money.</p>
        <p>My mistake was stepping away from the product when it was clearly the most urgent problem. In hindsight, <strong>we should have used a simpler solution like Tienda Nube or Shopify</strong>, at least for the MVP.</p>
        <p>This lack of execution ended up affecting every part of the business. It made it harder to close deals with brands and to raise capital, as we were often exposed for not being able to deliver fast enough. It also impacted team motivation, as delays and uncertainty started to build over time.</p>
        <p style="margin-top:48px;"><strong>Our lack of organization and alignment directly impacted our execution speed.</strong></p>
        <p>We were highly disorganized, and the team did not clearly understand the direction. While I was comfortable with my own way of working, it did not translate well once we started building a team. My cofounder and the rest of the team were not always aligned with the direction I had in mind. I would sometimes shift priorities, but their tasks remained the same. We were not in sync, and that slowed us down.</p>
        <p>At first, everything was managed through WhatsApp, which was unprofessional and inefficient. Messages got lost, and it was very difficult to track goals or progress. Over time, we improved this by moving to Excel and later to Trello. Looking back, <strong>it was never a talent issue, it was a communication and structure problem.</strong> Once we identified it, we fixed it. We implemented Trello, defined weekly and biweekly goals, and introduced four weekly meetings: a <strong>Monday kickoff, a product meeting, a business update, and a Friday review.</strong> The impact was immediate. Still, this is something we should have implemented from day one.</p>
        <p style="margin-top:48px;"><strong>Another major challenge was not being able to secure enough brands.</strong></p>
        <p>I had the hypothesis that, given the crisis many brands were facing, it would be easier to access them. That assumption was wrong. I tried every possible channel: Instagram, LinkedIn, cold calls, referrals, and even visiting stores in person. Sometimes it worked, but most of the time I was ignored. This became a long and exhausting process that took months. Looking back, <strong>I believe I should have brought in a partner with direct access to decision makers in fashion brands.</strong></p>
        <p style="margin-top:48px;"><strong>Fundraising was another area where my lack of structure hurt me.</strong></p>
        <p><strong>I was not able to secure investment beyond friends and family</strong>, and a big part of that was my own organization. I did not have a proper system to track who I had spoken to or what the next steps were. Everything was scattered across WhatsApp and my calendar. This was a major mistake that likely cost me valuable opportunities. I also believe that <strong>being more direct with potential investors</strong> could have increased my chances of closing deals.</p>
        <p style="margin-top:48px;"><strong>We also misallocated time and energy, especially in marketing.</strong></p>
        <p>One example was social media. The idea was to build a content buffer on Instagram before launch, but the launch kept getting delayed, and that buffer became excessively large. I invested both my time and the team's time into something that did not generate results. If we had launched on time, it would have made sense. But once delays started, I should have adjusted and paced the effort differently.</p>
        <p style="margin-top:48px;"><strong>I also received valuable feedback about my leadership during high focus periods.</strong></p>
        <p>When I asked my team for feedback, one of the main points was that <strong>whenever I focused on high priority tasks such as fundraising or closing brands, I neglected the day to day operations of the business.</strong> That created gaps in execution and affected the team.</p>
        <p style="margin-top:48px;"><strong>Finally, I underestimated several key aspects of building a startup.</strong></p>
        <p>I underestimated <strong>the importance of profitability, the difficulty of raising capital</strong>, and the value of having a strong partner connected to fashion brands. I kept a low profile on LinkedIn to avoid brands noticing we were selling their products, which limited visibility. I was not demanding enough with influencers, I waited too long to secure formal agreements with brands, and in the first months I did not reach out to people who had previously tried and failed at similar ideas.</p>
        <p>I wish I had not made these mistakes, because I truly believed I had what it took to build this into a unicorn. But now that I have gone through them, <strong>I know they will make me much stronger for what comes next.</strong> My intention is to turn every one of these mistakes into lessons and make sure I do not repeat them.</p>

        <p style="margin-top:48px;"><strong>In marketing, we executed two actions that worked particularly well.</strong></p>
        <p>The first was hiring a friend and his sister to create TikTok and Reels style interviews. These videos performed very well, especially the first one, an interview that I designed between them, which <strong>reached over 170k views.</strong> That translated into more than <strong>5,500 people visiting the website</strong>, our first sales, and direct conversations with customers.</p>
        <p>The second win came from a campaign I built with Beyond, a brand that was about to attend New York Fashion Week. It started when I reached out to <strong>300 influencers</strong> looking for collaborations. Around 80 responded, and I initially worked with just three of them to produce content. That left me with a large pool of interested creators, but we had no budget and no products for gifting. So I approached Beyond with a proposal. I would connect them with these influencers, they would handle the product exchanges, and in return each influencer would create content for them and for us. This way everyone benefited. Beyond gained exposure without investing time, influencers received value through the exchange, and we got content for free. It worked extremely well. We partnered with a couple of influencers, and the videos <strong>surpassed 40k views</strong>, and we even built a long term relationship with them that helped us continue creating content.</p>

        <p>I actively looked for environments where I could learn and grow. I attended events like <strong>Arcap and Urucap</strong>, joined accelerators such as <strong>Draper University and SparkLab</strong>, and participated in hackathons within the entrepreneurial ecosystem. Every conversation, every event, and every person I met expanded my perspective and accelerated my growth in ways I could not have achieved alone.</p>

        <p style="margin-top:48px;"><strong>Learning to ask for help was another turning point in how I operated.</strong></p>
        <p>At first this was difficult for me, but once I embraced it I started seeing real changes. For example, when I began doubting my own leadership, I reached out to a successful entrepreneur from my school. <strong>That single conversation reshaped how I managed the team</strong> and gave me clarity in moments of uncertainty.</p>

        <p style="margin-top:48px;"><strong>I also made difficult but necessary decisions, even when they were personally hard.</strong></p>
        <p>At one point I felt that the best decision for Zoppa was to continue without my cofounder. He was an exceptional person and professional, and we had a genuine friendship. Still, I believed it was the right move for the company. It was a painful decision, but ultimately the correct one.</p>

        <p>There was a critical situation where we received a legal notice from a clothing brand because we were displaying their products on our Instagram and website. The team panicked, unsure if this would become a broader issue. My role was to bring calm. I explained that this was something I had already anticipated, that I had discussed it with lawyers, and that it was not a serious threat. I also reassured them by sharing real examples of brands that had reacted positively, even laughing, when they found out we had sold their products without prior agreement. <strong>This helped the team regain confidence and move forward without fear.</strong></p>

        <p style="margin-top:48px;"><strong>Finally, one of the things I am most proud of is how valued people felt while working with me.</strong></p>
        <p>When the team eventually moved on from Zoppa, all of them told me they always felt recognized and appreciated. One of them even thanked me because <strong>his experience at Zoppa helped him land a new job.</strong> They also highlighted that I was consistently clear about expectations and each person's role, which helped create alignment and trust within the team.</p>

        <p>Throughout Zoppa, I had to present the project to investors, executives, and founders. Those moments pushed me out of my comfort zone, but over time they built my confidence. Today, <strong>I feel comfortable speaking to people in positions of power as an equal.</strong></p>

        <p style="margin-top:48px;"><strong>Clarity drives execution.</strong></p>

        <p style="margin-top:48px;"><strong>Execution is what ultimately determines survival.</strong></p>

        <p style="margin-top:48px;"><strong>I learned the importance of balancing action and learning.</strong></p>
        <p>Waiting for everything to be perfect slows you down, but moving forward without learning from others leads to avoidable mistakes. <strong>Finding that balance is what keeps you moving forward.</strong></p>

        <p style="margin-top:48px;"><strong>Assumptions need to be validated, not just believed.</strong></p>
        <p>I assumed it would be easier to access brands given the context they were in, but that proved wrong. <strong>Strong assumptions are not enough, they need to be tested early and aggressively.</strong></p>

        <p>My expectation was that difficult conditions would make brands more receptive. What I found instead was that they remained consistent with their behavior. <strong>The industry is not very open to innovation or new technologies</strong>, and the crisis reinforced that mindset. Brands stayed cautious, selective, and resistant to change.</p>

        <p style="margin-top:48px;"><strong>We were fortunate that our first video went viral during the first week after launch.</strong></p>

    {

      body: `
        <p><strong>Professionally, I grew significantly in how I think and how I act.</strong></p>

  const order = sections.map(s => s.id);

  function render() {
    const hash = window.location.hash.replace('#', '') || '';
    const data = sections.find(s => s.id === hash);
    const container = document.getElementById('zoppa-container');
    const currentIdx = order.indexOf(hash);

    if (!data) {
      container.innerHTML = `
        <div class="not-found">
          <h1>Section not found</h1>
          <p>Head back to the Zoppa page.</p>
          <a href="detail.html#zoppa" class="btn-primary">← Back to Zoppa</a>
        </div>`;
      return;
    }

    document.title = `${data.title} — Zoppa`;

    const prevId   = currentIdx > 0 ? order[currentIdx - 1] : null;
    const nextId   = currentIdx < order.length - 1 ? order[currentIdx + 1] : null;
    const prevData = prevId ? sections.find(s => s.id === prevId) : null;
    const nextData = nextId ? sections.find(s => s.id === nextId) : null;

    const navHtml = `
      <div class="nav-milestones">
        <a href="zoppa.html#${prevId || ''}" class="nav-milestone-btn ${prevData ? '' : 'disabled'}" style="text-align:left;">
          ← Previous<br>
          <strong>${prevData ? prevData.title : '—'}</strong>
        </a>
        <a href="zoppa.html#${nextId || ''}" class="nav-milestone-btn ${nextData ? '' : 'disabled'}" style="text-align:right;">
          Next →<br>
          <strong>${nextData ? nextData.title : '—'}</strong>
        </a>
      </div>`;

    container.innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">JBAL</a>
        <span class="breadcrumb-sep">›</span>
        <a href="index.html#story">My Story</a>
        <span class="breadcrumb-sep">›</span>
        <a href="detail.html#zoppa">Zoppa</a>
        <span class="breadcrumb-sep">›</span>
        <span>${data.title}</span>
      </div>

      <div class="detail-card">
        <h1>${data.title}</h1>
        <div class="detail-body">${data.body}</div>
      </div>

      ${navHtml}
    `;
  }

  render();
  window.addEventListener('hashchange', render);
</script>
